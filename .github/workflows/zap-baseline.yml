name: ZAP Baseline Scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly 23:30 IST = 18:00 UTC
    - cron: "0 18 * * *"

concurrency:
  group: zap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zap-baseline:
    name: ZAP baseline scan (docker-compose backend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vachanam
          POSTGRES_PASSWORD: localdev123
          POSTGRES_DB: vachanam_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://vachanam:localdev123@localhost:5432/vachanam_dev
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-not-real-do-not-use-in-prod
      JWT_EXPIRE_HOURS: "24"
      GOOGLE_OAUTH_CLIENT_ID: test-client-id.apps.googleusercontent.com
      GOOGLE_OAUTH_CLIENT_SECRET: test-client-secret
      GOOGLE_APPLICATION_CREDENTIALS: ""
      GOOGLE_CALENDAR_SERVICE_EMAIL: test@test.iam.gserviceaccount.com
      APP_ENV: development
      BASE_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: warning
      ADMIN_PHONE: "+919999999999"
      SARVAM_API_KEY: test-sarvam-key
      OPENAI_API_KEY: test-openai-key
      GEMINI_API_KEY: test-gemini-key
      LIVEKIT_URL: wss://test.livekit.local
      LIVEKIT_API_KEY: test-livekit-key
      LIVEKIT_API_SECRET: test-livekit-secret
      VOBIZ_SIP_DOMAIN: test.sip.vobiz.ai
      VOBIZ_SIP_USERNAME: test-user
      VOBIZ_SIP_PASSWORD: test-pass
      VOBIZ_DID_NUMBER: "+914066000000"
      VOBIZ_PARTNER_AUTH_ID: test-partner-id
      VOBIZ_PARTNER_AUTH_TOKEN: test-partner-token
      META_ACCESS_TOKEN: test-meta-token
      META_PHONE_NUMBER_ID: "000000000000000"
      META_WABA_ID: "000000000000000"
      META_WEBHOOK_VERIFY_TOKEN: test-verify-token
      META_APP_SECRET: test-app-secret
      RAZORPAY_KEY_ID: rzp_test_fakekeyforci
      RAZORPAY_KEY_SECRET: test-razorpay-secret
      RAZORPAY_WEBHOOK_SECRET: test-webhook-secret
      RAZORPAY_PLAN_SOLO_ID: plan_solo_test
      RAZORPAY_PLAN_CLINIC_ID: plan_clinic_test
      RAZORPAY_PLAN_MULTI_ID: plan_multi_test
      RATE_LIMIT_BYPASS_IPS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Start backend (uvicorn)
        run: |
          nohup python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend to be ready..."

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: not ready, waiting 2s..."
            sleep 2
          done
          echo "Backend failed to start within 60s"
          exit 1

      - name: Create ZAP output directory
        run: mkdir -p zap

      - name: Run ZAP baseline scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd)/zap:/zap/wrk:rw \
            -t softwaresecurityproject/zap-stable:latest \
            zap-baseline.py \
              -t http://localhost:8000 \
              -r zap-report.html \
              -I

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap/zap-report.html
          retention-days: 90

      - name: Fail on high-risk findings
        if: always()
        run: |
          if [ -f zap/zap-report.html ]; then
            if grep -q 'risk-3' zap/zap-report.html; then
              echo "::error::ZAP found HIGH-RISK findings. Check the uploaded report."
              exit 1
            fi
            echo "No high-risk findings detected."
          else
            echo "::warning::ZAP report not found — scan may have failed."
          fi

      - name: Stop backend
        if: always()
        run: |
          pkill -f "uvicorn backend.main:app" || true
