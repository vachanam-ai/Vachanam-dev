name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # ── Job 0: Lint (fast fail — #343 keeps the tree ruff-clean) ───────────────
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend agent tests

  # ── Job 1: Test suite ──────────────────────────────────────────────────────
  test:
    name: pytest (Python 3.11 + PG16 + Redis7)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vachanam
          POSTGRES_PASSWORD: localdev123
          POSTGRES_DB: vachanam_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # ── Clock ───────────────────────────────────────────────────────────────
      # The app computes clinic dates in IST; tests use date.today(). On UTC
      # runners those disagree between 18:30-24:00 UTC (= IST past midnight),
      # failing 8 date tests. Pin the suite to the product's timezone.
      TZ: Asia/Kolkata

      # ── Database ────────────────────────────────────────────────────────────
      DATABASE_URL: postgresql+asyncpg://vachanam:localdev123@localhost:5432/vachanam_dev
      # conftest's prod-fuse (#324) REQUIRES a distinct test DB whose name
      # contains "_test" — the db fixture builds/drops schema on it per test.
      TEST_DATABASE_URL: postgresql+asyncpg://vachanam:localdev123@localhost:5432/vachanam_test

      # ── Redis ───────────────────────────────────────────────────────────────
      REDIS_URL: redis://localhost:6379

      # ── Auth ────────────────────────────────────────────────────────────────
      # Deterministic test secret — NOT a real production value.
      JWT_SECRET: ci-test-jwt-secret-not-real-do-not-use-in-prod
      # JWT_EXPIRE_HOURS deliberately UNSET: test_jwt_expire_default_is_8h
      # asserts the config default (8h) with no env override.

      # ── Google OAuth (test stub — backend verifies against Google public keys;
      #    tests that exercise /auth/google use monkeypatching to skip real
      #    Google verification, so this value only needs to be non-empty) ──────
      GOOGLE_OAUTH_CLIENT_ID: test-client-id.apps.googleusercontent.com
      GOOGLE_OAUTH_CLIENT_SECRET: test-client-secret
      GOOGLE_APPLICATION_CREDENTIALS: ""
      GOOGLE_CALENDAR_SERVICE_EMAIL: test@test.iam.gserviceaccount.com

      # ── App config ──────────────────────────────────────────────────────────
      APP_ENV: development
      BASE_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: warning
      ADMIN_PHONE: "+919999999999"

      # ── AI (test stubs — agent tests use mocks; no real API calls in CI) ────
      SARVAM_API_KEY: test-sarvam-key
      OPENAI_API_KEY: test-openai-key
      GEMINI_API_KEY: test-gemini-key

      # ── LiveKit ─────────────────────────────────────────────────────────────
      LIVEKIT_URL: wss://test.livekit.local
      LIVEKIT_API_KEY: test-livekit-key
      LIVEKIT_API_SECRET: test-livekit-secret

      # ── Telephony ───────────────────────────────────────────────────────────
      VOBIZ_SIP_DOMAIN: test.sip.vobiz.ai
      VOBIZ_SIP_USERNAME: test-user
      VOBIZ_SIP_PASSWORD: test-pass
      VOBIZ_DID_NUMBER: "+914066000000"
      VOBIZ_PARTNER_AUTH_ID: test-partner-id
      VOBIZ_PARTNER_AUTH_TOKEN: test-partner-token

      # ── WhatsApp ────────────────────────────────────────────────────────────
      META_ACCESS_TOKEN: test-meta-token
      META_PHONE_NUMBER_ID: "000000000000000"
      META_WABA_ID: "000000000000000"
      META_WEBHOOK_VERIFY_TOKEN: test-verify-token
      META_APP_SECRET: test-app-secret

      # ── Payments ────────────────────────────────────────────────────────────
      RAZORPAY_KEY_ID: rzp_test_fakekeyforci
      RAZORPAY_KEY_SECRET: test-razorpay-secret
      RAZORPAY_WEBHOOK_SECRET: test-webhook-secret
      RAZORPAY_PLAN_SOLO_ID: plan_solo_test
      RAZORPAY_PLAN_CLINIC_ID: plan_clinic_test
      RAZORPAY_PLAN_MULTI_ID: plan_multi_test

      # ── Rate-limit bypass (CI runner IP) ────────────────────────────────────
      RATE_LIMIT_BYPASS_IPS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # NO pip cache: every install below is --no-cache-dir, so the cache
          # post-step found an empty dir and FAILED the job even though every
          # real step (incl. Run pytest) was green (#346 final gremlin).

      - name: Install backend dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Install agent dependencies (LiveKit)
        run: pip install --no-cache-dir -r agent/livekit_minimal/requirements.txt

      - name: Install test toolchain
        # #346: pytest was never pinned anywhere — the step below ran on a
        # runner with no pytest (masked for weeks by the alembic step failing
        # first).
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Create test database
        # The PG service only creates vachanam_dev; the conftest fuse needs a
        # separate vachanam_test (name must contain "_test").
        run: PGPASSWORD=localdev123 psql -h localhost -U vachanam -d vachanam_dev -c "CREATE DATABASE vachanam_test"

      - name: Alembic chain sanity (single head)
        # `alembic upgrade head` from base is KNOWN-broken (TD-027: migration
        # 8559 is a full-schema rewrite; every env bootstraps via create_all +
        # stamp — the tests' conftest does exactly that). What CI CAN verify
        # cheaply: the chain still has exactly ONE head, so a mis-parented
        # new migration fails the build instead of splitting prod.
        run: |
          HEADS=$(alembic heads | wc -l)
          echo "alembic heads: $HEADS"
          test "$HEADS" -eq 1

      - name: Run pytest
        run: pytest tests/ -q --tb=short

  # ── Job 2: Frontend (lint + unit tests + build) ───────────────────────────
  # Added after FIXLOG #380: an undefined-variable reference white-screened the
  # Settings page and shipped because the frontend was NEVER built/linted/tested
  # in CI. `npm run lint` = the no-undef gate; `npm test` = vitest; `npm run
  # build` = the same Vite build Cloudflare Pages runs.
  frontend:
    name: frontend (lint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ── Job 3: Secret scan (gitleaks) ─────────────────────────────────────────
  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Job 4: Release + Deploy (push to master only, AFTER every gate is green) ─
  # Full auto-deploy: a green master push auto-bumps the semver tag, cuts a
  # GitHub Release, and ships the Fly agent. Render (backend) + Cloudflare Pages
  # (frontend) auto-deploy from the same push via their native GitHub hookup —
  # this job only *adds* the deploy that was manual (Fly) + the version tag.
  # Rollback: run the Rollback workflow with any prior tag (.github/workflows/
  # rollback.yml). Required repo secret: FLY_API_TOKEN. See .github/DEPLOY.md.
  release:
    name: semver tag + deploy
    runs-on: ubuntu-latest
    needs: [lint, test, frontend, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      # Fail FAST before any tag/release/deploy if the deploy secret is missing —
      # a half-released state (tag pushed, deploy failed) is the messy case.
      - name: Require FLY_API_TOKEN
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: test -n "$FLY_API_TOKEN" || { echo "::error::FLY_API_TOKEN secret not set — aborting before tag/deploy"; exit 1; }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semver
        id: ver
        # Bump rule (Conventional Commits since last v-tag):
        #   BREAKING CHANGE / `type!:` → major · `feat:` → minor · else → patch.
        # No prior tag → seed v1.0.0 (prod is already live at 1.x).
        run: |
          set -euo pipefail
          LAST=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$LAST" ]; then
            NEXT="v1.0.0"
            echo "no prior semver tag -> $NEXT"
          else
            LOG=$(git log --format='%B' "${LAST}..HEAD")
            V=${LAST#v}
            MAJ=${V%%.*}; REST=${V#*.}; MIN=${REST%%.*}; PAT=${REST#*.}
            if echo "$LOG" | grep -qE 'BREAKING CHANGE|^[a-z]+(\(.+\))?!:'; then
              MAJ=$((MAJ+1)); MIN=0; PAT=0
            elif echo "$LOG" | grep -qE '^feat(\(.+\))?:'; then
              MIN=$((MIN+1)); PAT=0
            else
              PAT=$((PAT+1))
            fi
            NEXT="v${MAJ}.${MIN}.${PAT}"
            echo "${LAST} -> ${NEXT}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG='${{ steps.ver.outputs.tag }}'
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes --title "$TAG"

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy agent to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # Working tree == the just-pushed commit, so this ships the right ref
        # (flyctl builds the tree, not a git ref — see project memory).
        run: flyctl deploy --config infra/fly.agent.toml --remote-only
