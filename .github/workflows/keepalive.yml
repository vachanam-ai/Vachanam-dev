# Keep the Render free-tier backend warm so its in-process APScheduler (30-min
# reminders, cascade-rebook, call scoring, DPDP retention) keeps running. Free
# services sleep after ~15 min idle; if the backend naps, the reminder due in
# that window never fires.
#
# Why this changed (2026-07-03): a plain */10 single-ping stopped being enough.
# GitHub's scheduled `cron` is BEST-EFFORT — runs get delayed or dropped under
# load. One dropped */10 tick = ~20 min gap > Render's 15-min sleep = a missed
# reminder. Public repo -> Actions minutes are free, so we spend margin freely:
#   1. fire every 5 min (the cron minimum), and
#   2. each run pings 4x at 60s spacing, so ONE fired run keeps it warm for ~4
#      min on its own — a single dropped tick no longer lets it sleep.
# ponytail: best-effort cron is the ceiling here; the only fully-reliable fix is
# an always-on paid Render tier (no keep-alive needed) — deferred (costs money).
name: keep-render-warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# A slow run must never block the next scheduled one from starting.
concurrency:
  group: keep-render-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # A 200 wakes/keeps it warm; a slow cold-start still counts as activity,
      # so never fail the job on a timeout. 4 pings @ 60s bridge cron drift.
      - run: |
          # NB: `[ $i -lt 4 ] && sleep` as the loop's last command made the
          # FINAL iteration exit 1 → the job "failed" every 5 minutes and
          # GitHub emailed every failure (FIXLOG #346 — the mail flood).
          for i in 1 2 3 4; do
            curl -fsS --max-time 90 https://vachanam-backend.onrender.com/health || true
            if [ "$i" -lt 4 ]; then sleep 60; fi
          done
