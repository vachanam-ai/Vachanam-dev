name: security-gate

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Weekly re-audit — new CVEs get published against ALREADY-pinned deps, so
    # a repo with no pushes would otherwise never learn about them.
    - cron: "30 2 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend dependencies
        # Fails the build on any known CVE in pinned requirements. No ignores:
        # TD-037 migrated python-jose → PyJWT, dropping the vulnerable ecdsa
        # transitive dep (PYSEC-2026-1325) entirely.
        run: pip-audit -r backend/requirements.txt
      - name: Audit voice-agent dependencies
        # The Fly agent ships its own pinned set — audit it too (was missed).
        run: pip-audit -r agent/livekit_minimal/requirements.txt

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the test scans every commit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install pytest
      - name: Scan git history for real secrets
        # --noconftest: this job installs ONLY pytest; the repo conftest pulls
        # pytest_asyncio + backend deps and killed collection (#346). The scan
        # itself is pure subprocess+regex — it needs no fixtures.
        run: python -m pytest tests/security/test_secrets_not_in_repo.py --noconftest -q --tb=short

  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (production deps, high+)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
