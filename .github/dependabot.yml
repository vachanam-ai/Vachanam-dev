version: 2

updates:
  # ── Backend Python dependencies ────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "main"
    labels:
      - "dependencies"
      - "python"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
    # Dependabot reads backend/requirements.txt from the root directory scan.

  # ── Agent Python dependencies (LiveKit) ────────────────────────────────────
  # Scoped to the live LiveKit agent so PRs are clearly labelled. (The retired
  # Pipecat agent/requirements.txt was removed 2026-06-15.)
  - package-ecosystem: "pip"
    directory: "/agent/livekit_minimal"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "main"
    labels:
      - "dependencies"
      - "python"
      - "agent"
    commit-message:
      prefix: "chore(deps)"

  # ── Frontend npm dependencies ──────────────────────────────────────────────
  # frontend/ does not exist yet (Phase 7). Entry is future-proofed so
  # Dependabot begins monitoring the moment package.json is committed.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "main"
    labels:
      - "dependencies"
      - "javascript"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    target-branch: "main"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
