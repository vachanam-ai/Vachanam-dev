app = "vachanam-agent"
primary_region = "bom"  # Mumbai — lowest latency for India

[build]
  dockerfile = "infra/Dockerfile.agent"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # voice agent must never cold-start
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

# Secrets (set via: fly secrets set KEY=VALUE)
# SARVAM_API_KEY
# OPENAI_API_KEY
# GEMINI_API_KEY
# LIVEKIT_URL
# LIVEKIT_API_KEY
# LIVEKIT_API_SECRET
# VOBIZ_SIP_DOMAIN
# VOBIZ_SIP_USERNAME
# VOBIZ_SIP_PASSWORD
# VOBIZ_DID_NUMBER
# VOBIZ_PARTNER_AUTH_ID
# VOBIZ_PARTNER_AUTH_TOKEN
# DATABASE_URL
# REDIS_URL
# JWT_SECRET
# META_ACCESS_TOKEN
# META_PHONE_NUMBER_ID
# META_WABA_ID
# META_WEBHOOK_VERIFY_TOKEN
# META_APP_SECRET
# GOOGLE_APPLICATION_CREDENTIALS (path inside container)
# GOOGLE_OAUTH_CLIENT_ID
# GOOGLE_OAUTH_CLIENT_SECRET
# GOOGLE_CALENDAR_SERVICE_EMAIL
# ADMIN_PHONE
