app = "vachanam-agent"
primary_region = "bom"  # Mumbai — lowest latency for India

[build]
  dockerfile = "infra/Dockerfile.agent"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "info"

# The LiveKit worker dials OUT to LiveKit Cloud and registers as a worker; it
# serves NO inbound HTTP (the old http_service internal_port=8080 pointed at the
# retired Pipecat/Vobiz uvicorn app — finding #32). The machine must stay warm
# (a voice agent must never cold-start) so we keep it always-running and let Fly's
# default process check cover liveness — there is no HTTP endpoint to probe.
[deploy]
  strategy = "rolling"

# No [http_service]: this process has no listening socket. Keep exactly one
# machine running at all times; never auto-stop on idle.
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

# Secrets (set via: fly secrets set KEY=VALUE)
# SARVAM_API_KEY
# OPENAI_API_KEY
# GEMINI_API_KEY
# LIVEKIT_URL
# LIVEKIT_API_KEY
# LIVEKIT_API_SECRET
# VOBIZ_SIP_DOMAIN
# VOBIZ_SIP_USERNAME
# VOBIZ_SIP_PASSWORD
# VOBIZ_DID_NUMBER
# VOBIZ_PARTNER_AUTH_ID
# VOBIZ_PARTNER_AUTH_TOKEN
# DATABASE_URL
# REDIS_URL
# JWT_SECRET
# META_ACCESS_TOKEN
# META_PHONE_NUMBER_ID
# META_WABA_ID
# META_WEBHOOK_VERIFY_TOKEN
# META_APP_SECRET
# GOOGLE_APPLICATION_CREDENTIALS (path inside container)
# GOOGLE_OAUTH_CLIENT_ID
# GOOGLE_OAUTH_CLIENT_SECRET
# GOOGLE_CALENDAR_SERVICE_EMAIL
# ADMIN_PHONE
