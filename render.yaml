services:
  - type: web
    name: vachanam-backend
    runtime: python
    # FREE to start: $0 but the service SPINS DOWN after ~15min idle and
    # cold-starts (~50s) on the next request. This does NOT affect live calls /
    # bookings — the Fly voice agent talks to Neon + LiveKit + Calendar directly,
    # never through this backend; only the owner web dashboard/login/OTP pays the
    # cold start. Upgrade to `starter` ($7/mo, always-on) before paying traffic.
    plan: free           # was starter ($7/mo always-on) — flip back when scaling
    region: singapore    # closest to India in Render's network
    buildCommand: pip install -r backend/requirements.txt
    # NOTE: preDeployCommand runs on PAID plans only — on `free` it is ignored, so
    # migrations are NOT auto-applied. Neon is already stamped at head, so this is
    # fine now; when a new migration ships, run `alembic upgrade head` manually
    # (or move back to `starter`). (TD-027: never an upgrade-from-base.)
    preDeployCommand: alembic upgrade head
    # 1 worker on free (512MB) — 2 would risk OOM. Bump with the plan.
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: SARVAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      # LiveKit SIP routing handles (NOT secrets — plain resource IDs). The
      # backend reads INBOUND_TRUNK_ID to auto-wire a saved DID into the inbound
      # trunk (Settings → DID → sync_did_to_inbound_trunk); without it the wire
      # silently no-ops and calls to that DID never reach the agent. OUTBOUND is
      # the global fallback trunk for outbound jobs (reminders, cascade rebook).
      # Recreate/rotate via scripts/setup_livekit_telephony.py.
      - key: INBOUND_TRUNK_ID
        value: ST_kcZDagvoGXMZ
      - key: OUTBOUND_TRUNK_ID
        value: ST_iYg89UWeyHPb
      # Global Vobiz fallback account (backend CDR sync = authoritative minutes/
      # billing + outbound jobs). Names MUST match backend.config field names
      # (vobiz_*); per-clinic sub-accounts override via Branch.vobiz_* columns.
      - key: VOBIZ_DID_NUMBER
        sync: false
      - key: VOBIZ_AUTH_ID
        sync: false
      - key: VOBIZ_AUTH_TOKEN
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_WABA_ID
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/google-service-account.json
      - key: GOOGLE_CALENDAR_SERVICE_EMAIL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_HOURS
        value: "8"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_SOLO_ID
        sync: false
      - key: RAZORPAY_PLAN_CLINIC_ID
        sync: false
      - key: RAZORPAY_PLAN_MULTI_ID
        sync: false
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      # REQUIRED in prod — Fernet key encrypting per-clinic Vobiz SIP passwords.
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      # smallest.ai TTS — backend needs it for voice cloning (clone endpoints).
      - key: SMALLEST_API_KEY
        sync: false
      # Email OTP (preferred over SMTP). RESEND_FROM domain must be verified.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: Vachanam <noreply@vachanam.in>
      - key: MSG91_AUTH_KEY
        sync: false
      # Real client IP behind Cloudflare + Render (2 proxy hops) — rate limiting.
      - key: TRUSTED_PROXY_HOPS
        value: "2"
      # Feedback-loop transcript capture + DPDP retention windows.
      - key: TRANSCRIPT_CAPTURE_ENABLED
        value: "true"
      - key: TRANSCRIPT_RETENTION_DAYS
        value: "90"
      - key: PATIENT_RETENTION_DAYS
        value: "730"
